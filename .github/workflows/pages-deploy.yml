name: "Build and Deploy"
on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # refresh: tag=$(curl -fsSL https://api.github.com/repos/actions/checkout/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p'); git ls-remote https://github.com/actions/checkout.git "refs/tags/${tag}" | awk '{print "uses: actions/checkout@" $1}'
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        # refresh: tag=$(curl -fsSL https://api.github.com/repos/actions/configure-pages/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p'); git ls-remote https://github.com/actions/configure-pages.git "refs/tags/${tag}" | awk '{print "uses: actions/configure-pages@" $1}'

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        # refresh: tag=$(curl -fsSL https://api.github.com/repos/actions/setup-go/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p'); git ls-remote https://github.com/actions/setup-go.git "refs/tags/${tag}" | awk '{print "uses: actions/setup-go@" $1}'
        with:
          go-version: "1.26.5" # latest: curl -s https://go.dev/VERSION?m=text
          cache: false

      - name: Install Hugo
        run: |
          set -eux
          # latest Hugo: curl -s https://api.github.com/repos/gohugoio/hugo/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p'
          curl -fsSL -o /tmp/hugo_checksums.txt https://github.com/gohugoio/hugo/releases/download/v0.164.0/hugo_0.164.0_checksums.txt
          grep "hugo_extended_0.164.0_linux-amd64.tar.gz" /tmp/hugo_checksums.txt | awk '{print $1 "  /tmp/hugo.tar.gz"}' > /tmp/hugo.sha256
          curl -fsSL -o /tmp/hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v0.164.0/hugo_extended_0.164.0_linux-amd64.tar.gz
          sha256sum -c /tmp/hugo.sha256
          tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo
          hugo version

      - name: Install Dart Sass
        run: |
          set -eux
          case "$(uname -m)" in
            x86_64|amd64)
              sass_asset="dart-sass-1.101.0-linux-x64.tar.gz"
              sass_sha256="13c47fe50f707df6d5c2ea8e612ab3ce3b81e351c31f0ebb43072ca7781ad3da"
              ;;
            aarch64|arm64)
              sass_asset="dart-sass-1.101.0-linux-arm64.tar.gz"
              sass_sha256="fe3abb3697d5c835cb5fda9fb899dd1321dc031d75255bacd21917cb897ad944"
              ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/1.101.0/${sass_asset}" -o /tmp/dart-sass.tar.gz
          echo "${sass_sha256}  /tmp/dart-sass.tar.gz" | sha256sum -c -
          rm -rf "${RUNNER_TEMP}/dart-sass"
          tar -xzf /tmp/dart-sass.tar.gz -C "${RUNNER_TEMP}"
          chmod 0755 "${RUNNER_TEMP}/dart-sass/sass" "${RUNNER_TEMP}/dart-sass/src/dart"
          echo "${RUNNER_TEMP}/dart-sass" >> "$GITHUB_PATH"

      - name: Cache Hugo modules
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/hugo_cache
          key: hugo-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            hugo-modules-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: hugo mod get -u

      - name: Build site
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url }}"

      - name: Upload site artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        # refresh: tag=$(curl -fsSL https://api.github.com/repos/actions/upload-pages-artifact/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p'); git ls-remote https://github.com/actions/upload-pages-artifact.git "refs/tags/${tag}" | awk '{print "uses: actions/upload-pages-artifact@" $1}'
        with:
          path: "public"

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-26.04
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        # refresh: tag=$(curl -fsSL https://api.github.com/repos/actions/deploy-pages/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p'); git ls-remote https://github.com/actions/deploy-pages.git "refs/tags/${tag}" | awk '{print "uses: actions/deploy-pages@" $1}'
